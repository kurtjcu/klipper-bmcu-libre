# BMCU 370C Klipper Integration — Generic Configuration
# Copy this file's contents into your printer.cfg
#
# Prerequisites:
#   1. Run ./install.sh (symlinks bmcu_feeder.py and bmcu_channel.py into Klipper)
#   2. Find your BMCU serial path:
#      ls /dev/serial/by-path/
#   3. Update the serial path below
#   4. Restart Klipper: sudo systemctl restart klipper

[bmcu_feeder]
# Serial port — MUST use /dev/serial/by-path/ for stable device assignment
# Find yours with: ls /dev/serial/by-path/
serial: /dev/serial/by-path/platform-3f980000.usb-usb-0:1.1.3:1.0-port0
baud: 115200
# How often to query BMCU status (seconds). Lower = more responsive but more serial traffic
poll_interval: 0.5

# Stall detection (BREAKING CHANGE): the detector now compares Klipper's
# COMMANDED extrusion (extruder.find_past_position) against the BMCU's
# MEASURED feed over a rolling window, instead of an absolute per-poll
# delta threshold. This requires extruder: to be set below — a channel
# with no extruder configured has stall detection disabled entirely
# (runout/insert detection are unaffected). The old stall_threshold_mm
# and stall_debounce_count knobs no longer exist; replace them with
# min_commanded_mm / slip_ratio / stall_window_polls as shown below.

# Channel 0 — typically the first toolhead (T0)
[bmcu_channel 0]
extruder: extruder
runout_gcode:
    PAUSE
insert_gcode:
stall_gcode:
    PAUSE
event_delay: 3.0
pause_on_runout: True
# Minimum commanded extrusion (mm) over the window before a stall is even
# evaluated — ignores travel/retraction/slow features
min_commanded_mm: 1.0
# Trip when measured feed is less than this fraction of commanded — 0.5
# means fed less than half of what Klipper commanded
slip_ratio: 0.5
# Number of consecutive polls forming the cumulative evaluation window —
# this IS the debounce (a real jam must persist across the whole window)
stall_window_polls: 3
# Number of polls to skip after motor starts (grace window for motor acceleration)
stall_startup_ignore_polls: 2
# direction_invert: Uncomment if FWD ejects filament instead of feeding (V2.2 hardware has reversed motor wiring)
# direction_invert: True

# Channel 1 — second toolhead (T1)
[bmcu_channel 1]
extruder: extruder1
runout_gcode:
    PAUSE
insert_gcode:
stall_gcode:
    PAUSE
event_delay: 3.0
pause_on_runout: True
min_commanded_mm: 1.0
slip_ratio: 0.5
stall_window_polls: 3
stall_startup_ignore_polls: 2
# direction_invert: Uncomment if FWD ejects filament instead of feeding (V2.2 hardware has reversed motor wiring)
# direction_invert: True

# Channels 2 and 3 follow the same pattern
# Uncomment and configure as needed

# GCode Commands:
#   BMCU_RUN CHANNEL=N         — Start feeder motor on channel N
#   BMCU_STOP CHANNEL=N        — Stop feeder motor on channel N
#   BMCU_SPEED CHANNEL=N SPEED=75  — Set motor speed (0-100)
#   BMCU_DIR CHANNEL=N DIR=FWD — Set motor direction (FWD/REV)
#   BMCU_STATUS                — Print status table for all channels
#   BMCU_RESET_FEED            — Reset feed distance and stall count for all channels
#   BMCU_RESET_FEED CHANNEL=N  — Reset feed distance and stall count for channel N
#   SET_BMCU_SENSOR CHANNEL=N ENABLE=0|1  — Enable/disable sensor for channel N
#
# Moonraker Objects (visible in Mainsail/Fluidd diagnostic panel):
#   bmcu_feeder.channels.N.feed_mm           — Raw encoder distance (mm)
#   bmcu_feeder.channels.N.feed_mm_since_reset — Distance since last BMCU_RESET_FEED
#   bmcu_feeder.channels.N.stall_count       — Cumulative stall events since last reset
#   bmcu_feeder.channels.N.filament_present   — Filament sensor state
#   bmcu_feeder.channels.N.motor_running      — Motor running state
#
# Tip: Add BMCU_RESET_FEED to your START_PRINT macro to zero counters each job.

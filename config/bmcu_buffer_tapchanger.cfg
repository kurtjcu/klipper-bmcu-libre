# BMCU 370C Buffer Mode — viesturz/klipper-toolchanger Integration
#
# Prerequisites:
#   1. viesturz/klipper-toolchanger installed and configured (version 2026.2.15+)
#   2. [include config/bmcu_generic.cfg] already in printer.cfg and working
#      (verify: BMCU_STATUS returns clean output in Klipper console)
#
# Usage:
#   1. Add [include config/bmcu_buffer_tapchanger.cfg] to printer.cfg
#   2. Merge the [toolchanger] gcode sections below with your existing [toolchanger] section
#   3. Add params_bmcu_channel and the pickup/dropoff gcode to each [tool Tx] section
#   4. Adjust CHANNEL= numbers to match your physical wiring
#   5. Restart Klipper: sudo systemctl restart klipper
#
# Per-channel options (e.g. direction_invert) belong in the [bmcu_channel N]
# sections in bmcu_generic.cfg, not in this file.

# ---------------------------------------------------------------------------
# Global toolchanger hooks — disable all sensors before any toolchange,
# re-enable only the picked channel after.
# ---------------------------------------------------------------------------

[toolchanger]
# Disable all BMCU channels at the start of any toolchange to suppress spurious
# runout events during the window when filament is momentarily absent from the
# microswitch during docking/undocking.
before_change_gcode:
    SET_BMCU_SENSOR CHANNEL=0 ENABLE=0
    SET_BMCU_SENSOR CHANNEL=1 ENABLE=0
    SET_BMCU_SENSOR CHANNEL=2 ENABLE=0
    SET_BMCU_SENSOR CHANNEL=3 ENABLE=0

# Re-enable only the channel corresponding to the newly picked tool.
# Requires klipper-toolchanger 2026.2.15+ for the pickup_tool variable.
after_change_gcode:
    {% set ch = printer["tool " ~ pickup_tool].params_bmcu_channel | int %}
    SET_BMCU_SENSOR CHANNEL={ch} ENABLE=1

# If your klipper-toolchanger version does not support the pickup_tool variable,
# remove the after_change_gcode Jinja2 block above and instead add
#     SET_BMCU_SENSOR CHANNEL=N ENABLE=1
# to each tool's pickup_gcode section below (after the BMCU_RUN line).

# ---------------------------------------------------------------------------
# Per-tool motor control — add these to each [tool Tx] section.
# Adjust CHANNEL= to match the physical BMCU channel wired to this toolhead.
# ---------------------------------------------------------------------------

[tool T0]
params_bmcu_channel: 0
pickup_gcode:
    BMCU_RUN CHANNEL=0
dropoff_gcode:
    BMCU_STOP CHANNEL=0

[tool T1]
params_bmcu_channel: 1
pickup_gcode:
    BMCU_RUN CHANNEL=1
dropoff_gcode:
    BMCU_STOP CHANNEL=1

# Uncomment and configure for additional tools:
